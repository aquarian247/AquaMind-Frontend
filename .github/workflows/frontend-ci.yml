name: Frontend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      BACKEND_REPO: aquarian247/AquaMind
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run unit tests
      id: tests
      run: npm run test:ci

    - name: Generate Coverage Report
      run: |
        echo "📊 Generating coverage report..."
        npx vitest run --coverage
      continue-on-error: true

    - name: Fetch backend OpenAPI spec
      run: |
        mkdir -p tmp/openapi
        BACKEND_SPEC_BRANCH="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
        BACKEND_SPEC_URL="https://raw.githubusercontent.com/${BACKEND_REPO}/${BACKEND_SPEC_BRANCH}/api/openapi.yaml"

        echo "📥 Fetching backend OpenAPI spec from ${BACKEND_SPEC_URL}"
        if ! curl -fsSL "${BACKEND_SPEC_URL}" -o tmp/openapi/openapi.yaml; then
          echo "⚠️ Failed to fetch backend spec for branch ${BACKEND_SPEC_BRANCH}; falling back to main"
          BACKEND_SPEC_BRANCH="main"
          BACKEND_SPEC_URL="https://raw.githubusercontent.com/${BACKEND_REPO}/${BACKEND_SPEC_BRANCH}/api/openapi.yaml"
          curl -fsSL "${BACKEND_SPEC_URL}" -o tmp/openapi/openapi.yaml
        fi

        echo "BACKEND_SPEC_BRANCH=${BACKEND_SPEC_BRANCH}" >> "$GITHUB_ENV"
        echo "BACKEND_SPEC_URL=${BACKEND_SPEC_URL}" >> "$GITHUB_ENV"

    - name: Verify checked-in OpenAPI spec is current
      run: |
        if [ ! -f "api/openapi.yaml" ]; then
          echo "❌ api/openapi.yaml is missing"
          exit 1
        fi

        if ! cmp -s api/openapi.yaml tmp/openapi/openapi.yaml; then
          echo "❌ Frontend OpenAPI spec is out of sync with backend branch ${BACKEND_SPEC_BRANCH}"
          echo "Run 'npm run sync:openapi' (or branch-specific sync) and commit the regenerated client."
          echo "Showing the first 200 lines of spec drift:"
          git diff --no-index -- api/openapi.yaml tmp/openapi/openapi.yaml | sed -n '1,200p' || true
          exit 1
        fi

    - name: Regenerate API Client
      run: npm run generate:api

    - name: Type check (validate API contract)
      id: type-check
      run: npm run type-check
    
    # ------------------------------------------------------------------
    # Contract enforcement – ensure every endpoint used in the codebase
    # exists in the backend OpenAPI specification fetched above.
    # ------------------------------------------------------------------
    # NOTE: During Phase 1 we only WARN on failures so the pipeline keeps
    # moving.  Once legacy endpoints are removed in Phase 2 the guard can
    # be made blocking again (remove `continue-on-error` and `|| true`).
    - name: Validate API endpoints
      run: |
        # Check if the fetched OpenAPI spec exists for endpoint validation
        if [ -f "tmp/openapi/openapi.yaml" ]; then
          echo "✅ OpenAPI spec found, validating endpoints..."
          cp tmp/openapi/openapi.yaml api/openapi.yaml
          npm run validate:endpoints
        else
          echo "⚠️ OpenAPI spec not found, skipping endpoint validation"
          echo "To enable validation, ensure tmp/openapi/openapi.yaml is present"
        fi

    - name: Install Complexity Analysis Tools
      run: |
        echo "📦 Installing lizard for complexity analysis..."
        python3 -m pip install lizard

    - name: Analyze Code Complexity
      run: |
        echo "🔍 Running complexity analysis..."

        # Ensure output directory exists
        mkdir -p docs/metrics

        # Run complexity analysis (capture output to avoid exit code issues)
        echo "📊 Running full codebase analysis..."
        if python3 -m lizard client/src --exclude 'client/src/api/generated/**/*' -o docs/metrics/frontend_lizard_latest.txt 2>&1; then
          echo "✅ Full analysis completed successfully"
        else
          echo "⚠️ Full analysis completed with warnings"
        fi

        echo "📊 Running components analysis..."
        if python3 -m lizard client/src/components client/src/pages --exclude 'client/src/api/generated/**/*' -o docs/metrics/frontend_lizard_components_latest.txt 2>&1; then
          echo "✅ Components analysis completed successfully"
        else
          echo "⚠️ Components analysis completed with warnings"
        fi

        echo "📊 Checking for violations..."
        # Check for violations but don't fail the step
        if python3 -m lizard client/src --exclude 'client/src/api/generated/**/*' --CCN 15 --length 300 2>&1 | grep -q "CCN.*1[5-9]\|CCN.*[2-9][0-9]\|length.*30[0-9]\|length.*[4-9][0-9][0-9]"; then
          echo "⚠️ Complexity violations detected, but continuing (warn-only mode)"
          echo "Review the generated metrics files for details"
          echo "Current threshold: CCN > 15 or function length > 300 lines"
        else
          echo "✅ No complexity violations detected"
        fi

        echo "🧹 Cleaning up old metrics files..."
        find docs/metrics -name 'frontend_lizard_*.txt' -mtime +7 -delete 2>/dev/null || true

    - name: Upload Complexity Metrics
      uses: actions/upload-artifact@v4
      with:
        name: complexity-metrics
        path: |
          docs/metrics/frontend_lizard_latest.txt
          docs/metrics/frontend_lizard_components_latest.txt
        retention-days: 30

    - name: Build
      run: npm run build
      
    - name: Report contract validation status
      if: always()
      run: |
        # Check if critical steps (TypeScript + Tests) passed
        # Note: Complexity analysis is warn-only and doesn't affect validation status
        if [ "${{ steps.type-check.outcome }}" == "success" ] && [ "${{ steps.tests.outcome }}" == "success" ]; then
          echo "✅ Contract validation passed - TypeScript compilation and tests successful"
          echo "ℹ️ Complexity analysis completed (warn-only mode)"
        else
          echo "❌ Contract validation failed - critical steps failed"
          if [ "${{ steps.type-check.outcome }}" != "success" ]; then
            echo "  - TypeScript compilation failed"
          fi
          if [ "${{ steps.tests.outcome }}" != "success" ]; then
            echo "  - Unit tests failed"
          fi
          exit 1
        fi
